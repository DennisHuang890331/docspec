id: {id}
title: {title}            # 純章節名＝文件裡的章節標題；結晶時改成像樣的、別留 slug，**別加章號前綴**（6./11、）——章號由 render 從 order＋樹位置推導注入
order: {order}            # 數值；插節用小數（2.5）免整批重排。附錄/不編號節可另設 numbering: appendix|none
status: draft
concept: ""            # 一句話：這節到底在講什麼（aperture 核心）
brief:                 # 寫作信封（draft 的世界邊界）。值用專案語言寫，鍵固定英文。
                       # **差異制＋全可選**：只填與祖先鏈不同的欄，省略＝繼承（逐字複製祖先值＝lint WARN）。
                       # root 節例外——必須填滿 audience/depth/breadth（子孫才有得繼承）。
  audience: ""         # 寫給誰（與父不同才填）
  depth: ""            # 多深入（與父不同才填）
  breadth: ""          # 涵蓋多廣（與父不同才填）
  forbidden: []        # 不准寫什麼
  layout: prose        # enum: prose | table | list | diagram （diagram＝這節呈現為圖：圖住 assets/、由 dspx-diagram 作）
# kind: explain        # optional enum: explain | how-to | reference | tutorial （Diátaxis；沿樹繼承）
must_cover: []         # 本節非提不可的點（draft 的 checklist）
sources: []            # 純指標清單＝**外部出處**（標準/論文/資料集／"Author's design"），不存內容。
                       #   ⚠ 內部跨節依賴（引別節的決策）一律走 realizes:/governed-by:，**不要寫這裡**——
                       #   寫進 sources 對 staleness 隱形（決策被推翻時下游不會 stale）；check 抓到內部 id 在此會擋。
# realizes: []         # 本節散文實現了哪些決策（→ decisions/history 的 id）＝內部依賴的家、餵 staleness
# governed-by: []      # 本節受哪些上游 concept 治理（→ concept id）＝跨樹治理依賴、餵 staleness

# docspec — section-driven schema (built-in data model)
#
# Mechanism follows OpenSpec: one yaml declares "which artifacts exist, what fields each has, how they relate,
# and what instruction/template each carries". The semantics are reframed as docspec's "read/write contract / aperture projection":
#   - requires is always [] (writing is a loop; inside the loop there are zero dependencies, always writable)
#   - the real graph = the aperture read/write contract + the RelationKinds reference graph
#
# This file is the data-model authority (projected via `docspec guide`); early drafts live in openspec/explore-sessions/history/ (for tracing).
name: section-driven
version: 1
description: >
  docspec leaf-section data model. A leaf section (the smallest unit of an article written as prose) is composed of a set
  of files in one directory; docs/<article>/_latest is the prose deliverable projected from those files.

# Projection: docs/<article>/_latest is a pure-function projection of the leaf-section files (run by publish)
projection:
  produces: docs/<article>/_latest
  driven-by: publish
  reads: [concept, decisions, material]   # develop / history never enter

# skills × aperture (who reads / who writes; the hard projection whitelist of the instructions command)
skills:
  develop:
    reads:  [concept, decisions, material, develop, history, history-md]
    writes: [concept, decisions, material, develop, history, history-md]
  apply:
    # single prose-to-source alignment skill (the former draft + edit), two modes:
    #   rewrite (blind-render from the committed layer) + align (copy-prep / staleness alignment on docs).
    # reads = union of both (concept/decisions/material for rewrite, docs for align); writes docs.
    reads:  [concept, decisions, material, docs]
    writes: [docs]
  factcheck:
    reads:  [concept, decisions, material, history, history-md, docs]   # NOT develop.md (live scratch; gone by ready/apply)
    writes: []
  publish:
    reads:  [concept, decisions, material]
    writes: [docs]
  release:
    # release sits after publish, acting on the frozen snapshot: an interactive typesetting gate (export → proof to view pages → adjust the format layer only).
    # It reads/writes no corpus artifact — content's one source = the frozen snapshot md (byte-lock); it only touches the template pack
    # (the format layer), so its corpus aperture is empty. A problem content can't fix → raise an audit finding upstream (not a self-fix).
    reads:  []
    writes: []

# Workflow narrative (guide projects it as the single agent contract; lives in schema, never drifts)
workflow:
  loop: >
    Writing is a rolling loop over one section tree (corpus/<article>/): develop (think + crystallize) ⇄
    apply (rewrite = blind render / align = copy-prep) ⇄ factcheck (red-team) — all dependency-free, any order, no forced sequence.
    New = drill into an empty tree; revise = re-drill the affected subtree; same flow. docs/<article>/_latest is the projected deliverable.
  skills:
    - id: develop
      summary: Developmental editor. Think freely in develop.md, then crystallize into concept/decisions/material; a superseded decision stays marked in its decisions.yaml, a whole obsolete section retires via docspec retire.
      steps:
        - Read the forest map + roadmap first (docspec instructions develop <section>).
        - >-
          Name section folders (docspec new) with the chapter name in the DELIVERABLE language — the
          folder name is what a human sees browsing corpus/ (a Chinese document gets 適用範圍/, not an
          English slug). NEVER prefix a chapter number (1-適用範圍/): ordering's only source of truth is
          the order field (concept.yaml / group.yaml) and the outline NUMBER is derived by render from
          order + tree position (concept.title carries the BARE name — no 6./11、 prefix). A numbered
          folder name is a second, drifting source that every reorder would force a rename to fix.
          Renames/moves are now safe — they go through `docspec mv` (atomic: rewrites the path-keyed
          prose markers + audit/roadmap targets, self-checks, rolls back on failure) — but don't create
          a numbered name that needs one. Applies to NEW sections; existing slug-named trees stay legal
          (migrate them with `docspec tidy`, which renames folders to the delivery-language title via mv).
          To INSERT a section between order: 2 and order: 3, give it order: 2.5 (order is a number, not
          an integer) — render derives the outline number, so no sibling's order is touched; reserve
          integer re-spacing for a genuine large restructure. Renumbering a run of siblings by hand just
          to slot one in is exactly the mechanical churn the derived-numbering model exists to kill.
        - Think in develop.md ONLY; the other four files do not exist yet.
        - >-
          Reasoning lands AS IT HAPPENS — a long discussion or a reversal is written into develop.md
          while you think, not reconstructed after the fact. A section already crystallized (its
          develop.md was drained + deleted by ready) has no scratch home again until you reopen one:
          docspec new <section> --reopen rebuilds develop.md from the schema template (id/title/order
          read from the existing concept.yaml, never recomputed). A cross-section restructuring reopens
          the ROOT section's develop.md as the central workbench, and at crystallization the same
          four-question triage (scope→concept / rulings→decisions / facts→material / rejected→history)
          distributes each part to the section it belongs in; register the restructuring as a roadmap
          `doing` entry, and the existing roadmap lint (doing without a develop.md) becomes the
          deterministic "this reasoning has no home yet" reminder — no new rule.
        - >-
          Crystallize via four-question triage → scope→concept / rulings→decisions / facts→material /
          rejected→recorded; write each part with docspec put <section> <artifact> (engine-write). The
          leaf contract is CONCEPT-REQUIRED, the rest ON-DEMAND: build decisions.yaml
          ONLY when this section owns a normative ruling of its own — no ruling ⇒ no decisions.yaml (never a
          fabricated empty `entries: []`; a pure-overview leaf that only realizes rulings owned elsewhere is a
          legal one-file section). material.md only when it has digested facts. Rejected/superseded reasoning is
          recorded as a status: superseded decision that STAYS in decisions.yaml (addressable), not moved into a
          live-tree history.yaml; genuine throwaway is deleted. Write each brief field ONLY where it differs from
          the ancestor chain (an absent field = inherit; restating an ancestor value verbatim is lint-flagged).
        - Graduate with docspec ready <section> (a checked transaction; it drains then deletes develop.md).
      transaction: ready
    - id: apply
      summary: >-
        Prose-to-source alignment (the single skill; former draft + edit), two engine-routed modes.
        rewrite mode = blind-render a section into its slot in docs/_latest from the aperture; align
        mode = copy-prep (line → copy → proofread) plus narrative/ruling/style alignment on
        docs/_latest. Mode is picked from the change target action (create/revise/redraft → rewrite;
        align/review → align) or, outside a change, the staleness type (stale-own/upstream/unwritten/
        redraft → rewrite; stale-inherited/style/norm/drifted → align) — never an operator routing table.
      steps:
        - >-
          Pick the mode first (docspec status / docspec change status): inside a change the target
          action decides (create/revise/redraft → rewrite, align/review → align); outside a change the
          staleness type decides (stale-own/stale-upstream/unwritten/redraft → rewrite, stale-inherited/
          stale-style/stale-norm/drifted → align). The engine routes; you do not read a who-picks-it-up
          table. docspec instructions apply <section> projects the current mode + clear-with verb, the
          writing principles, the verdict-verb whitelist, and the dispatch-exclusion list — anchor to it.
        - >-
          rewrite mode — render only stale-own / stale-upstream / not-yet-written sections (a
          redraft-flagged section surfaces as ordinary stale-own; your rewrite clears the flag on
          render); write from the committed layer, blind to siblings; never read develop.md or history;
          honor the brief as a hard contract, lead with the payload, and mark any missing fact/rationale
          [TBD] rather than fabricate it.
        - >-
          align mode — route each check (deterministic → engine lint/check; judgment → a clean-context
          subagent); touch only docs/_latest, never the outline or decisions. Before an align edit,
          docspec show <section> --impact previews which other documents the change ripples to.
        - >-
          Clear a staleness verdict with the matching verb — NEVER fabricate an edit (nor a
          perturb-render-revert dance) to force a re-stamp. Prose changed → plain docspec render.
          stale-norm (an ancestor's active normative ruling changed) → re-check the prose
          sentence by sentence against the new ruling first: conforming with no change needed →
          render --ack <section>; violating → rewrite (escalate via docspec stale).
          stale-inherited / stale-style with prose legitimately unchanged → render --ack <section>
          (refused on stale-own/upstream). stale-own / stale-upstream where the source change is
          structural wiring / metadata ONLY (realizes/governed-by re-wiring, order changes,
          sources: path moves, decided-in corrections, title renumbering) →
          render --ack-own <section> --reason <text>; a content-bearing change (must_cover,
          breadth, a decision statement) → docspec stale <section> (or docspec stale <article> for a whole re-projection) + rewrite mode, never ack-own.
          Every verdict is journaled — give a real --reason; after an ack-own a factcheck
          follow-up is expected (you attested the prose still implements CHANGED source).
      transaction: render
    - id: factcheck
      summary: Adversarial red-team. The only full reader; flags findings, never fixes.
      steps:
        - Check every claim against a primary source; record a verdict (entailed / contradicted / unsupported).
        - Audit the outline for MECE gaps/overlaps; detect deliverable-vs-source drift (docspec diff).
        - Route findings via docspec audit raise (non-blocking).
      transaction: audit
    - id: publish
      summary: Release gate — the only irreversible boundary; gates green → freeze a read-only snapshot + bump version.
      steps:
        - Run only on the human's explicit trigger.
        - check + lint + cleanliness all green → freeze the archive snapshot, write the semver changelog row.
      transaction: publish
    - id: release
      summary: Typesetting gate after publish — interactive layout of a frozen snapshot into a delivered PDF.
      steps:
        - docspec export (snapshot → PDF, content byte-locked) → docspec proof (PDF → page PNGs).
        - You + the human read the pages; adjust the format layer via validated knobs first; re-export until right.
        - Content never moves; a layout problem fixable only by changing content → raise an audit finding upstream.
      transaction: export
  boundaries:
    - publish is the only irreversible boundary; the human always pulls the trigger.
    - release touches the format layer only (template-pack params), never content — content's one source is the frozen snapshot md (export byte-lock guards it); a layout problem fixable only by changing content → raise an audit finding upstream, the human re-edits → re-publishes → re-releases; the agent never self-fixes content.
    - Completeness gates sit at advancement (docspec ready / publish), not at write time — half-formed work is free inside the loop, it just stays "developing".
    - Semantic judgment → audit (factcheck), never an engine gate (audit itself can hallucinate).
    - Mechanical text edits are ENGINE transactions, never hand-typed occurrence-by-occurrence — a rename/move goes through `docspec mv` (atomic; rewrites the path-keyed prose markers + audit/roadmap targets, self-checks, rolls back on failure), punctuation width through `docspec normalize`, corpus hygiene / empty-shell + verbatim-brief + title-number cleanup through `docspec tidy`, a project-wide term substitution through `docspec rename-term` (prose-span only; identifiers/code/URLs byte-exact). Hand-editing these — or an ad-hoc find-replace script — is the drift/corruption class the real corpus died on (a 22-script replace run that poisoned `OCC_LIMIT_*` identifier codes); use the command or a script that calls it, never a blind sweep.
    - Pin line endings at the repo level — a .gitattributes with `*.md` / `*.yaml` / `*.yml` as `text eol=lf` (docspec init scaffolds it for new projects; EXISTING projects should add it themselves). The engine normalizes CRLF when fingerprinting and writes LF, but the repo pin is the third defense layer against git autocrlf rewriting checkouts.
    - corpus/_archive/ = retired sections (decision history): engine-invisible in active work (status/check/apply never see it); query with docspec retired, drill with docspec show <id>. It is history — never touch it in current work (unlocked, by convention, like OpenSpec's changes/archive).
    - Work that touches a NORMATIVE ruling or spans sections runs inside a CHANGE (docspec change new … --publish advisory|release-bound) — a staging draft branch: edits land in changes/<id>/staging/, official corpus/docs stay byte-frozen, render --change previews the union view, and `docspec change status` DERIVES per-target acceptance. Open it mid-develop (the moment you realize you're superseding a decision / rippling across documents), not as an upfront ceremony; the enlistment line is "touches a ruling?", not section count. The human's one gate is `docspec change archive` (running it = acceptance; "reject" = keep editing until the derivation goes green; abandon a dead end with --abandon, official never moved). NEVER hand-check off a task and NEVER author a progress/status/checkbox file — completeness is always derived; "tasks" names the derived view only.
    - Engine commands (docspec new/render/ready/check/status/stale/normalize/tidy/mv/rename-term/change …) are the agent's internal machinery — run them autonomously, never ask the human "should I run docspec X?", never narrate command invocations. The human interface is intent-in / deliverable-out (they read docs/, not corpus/ or the engine). This is a runtime-conversation discipline the engine cannot observe — it is doctrine and reviewer vigilance, NOT a mechanical gate; the projection must not claim enforcement it does not have.
    - Contradictory inherited writing requirements converging on ONE section (a tree-parent brief vs a cross-tree governor brief, or two sibling governors) → STOP and surface both sources verbatim to the human; never pick a winner yourself (no precedence order is defined — it is a semantic call). check/lint back you up with a WARN when the aperture ancestor set supplies one brief field from two sources with divergent values, but the stop-and-ask is yours.
  # Migration onboarding: how an EXISTING project (pre-docspec published versions + an existing
  # version history) enters docspec. The recipe lives here and is projected by `docspec guide` —
  # never restated in drifting prose (guide omits the block when a schema lacks this key).
  migration:
    summary: >-
      Migrating an existing project into docspec — three steps, in order, all before the first
      publish. The steps are independent (each can be retried on its own); none is optional when
      the project carries pre-docspec published versions and an existing version lineage.
    steps:
      - >-
        Register the pre-docspec legacy versions into the freeze hash net:
        docspec publish register-legacy <dir> [--into <name>]. The engine moves them under
        docs/archive/legacy/<name>/ (a source already inside an archive/ folder is registered
        in place) and records their hashes in the `legacy:` table of .freeze.yaml — the same
        tamper/deletion protection as published snapshots. Already-registered paths are refused
        as a whole batch, and there is no unregister (the frozen area is append-only;
        re-registering would launder a tampered hash).
      - >-
        Pre-seed the existing revision history into the article's changelog file (flat layout:
        docs/revision_history/<slug>.md; per-article: docs/<article>/changelog.md) so the
        pre-docspec lineage stays visible in one table — publish keeps the seeded rows and
        appends each new release below them.
      - >-
        Seed the version chain on the FIRST publish: docspec publish <article> --set-version
        <one step after the highest pre-docspec version> (e.g. history ended at 2.5.1 →
        --set-version 2.5.2). First publish only — once any version exists the flag is refused
        (it cannot rewrite history); later releases bump normally with --level.

# Authoring authority — the writing rules `docspec instructions apply <section>` projects so the
# redesigned apply skill can ANCHOR to them instead of restating them (iron law 2: rules live in the
# schema and get projected, never duplicated in drifting skill prose). These are TECHNICAL / EXPOSITORY
# defaults; the active writing-guide profile OVERRIDES them per genre (fiction relaxes zero-inference,
# academic builds claim→evidence, …) — follow the projected writing-guide, never apply these blindly.
# (Kept a top-level key, read straight from schema.yaml by instructions.py — it is doctrine, not an
# artifact contract, so it stays out of the artifact/guide projections.)
authoring:
  principles:
    - "Lead with the payload — every paragraph opens on the fact or decision; no preamble, no runway."
    - "Inverted pyramid — the section's first sentence is its conclusion; detail descends from there."
    - "Density over length — one idea per paragraph, 4–5 sentences max; active voice; no recaps of earlier sections, no previews of later ones."
    - "Structure over prose — any data that is ≥3 items across ≥2 dimensions, and ALL rules / logic / state, goes in a table or list, never prose (obey the section's brief.layout). Structure suppresses flowery filler."
    - "Honor the section's kind — reference = a lookup terminal (tables/definitions, no narrative arc), how-to = ordered task steps, tutorial = a learning walkthrough, explain = discursive prose; kind shapes form only, never adds content."
    - "No scaffolding metadiscourse — never narrate this section's own brief (its scope / exclusions / verifiability / downstream-governance) nor, at document level, the document's own layout (a prose table of contents, 「先以…再以…最後…」, 各章環環相扣, 本規範把…整合成一份…). State the substance directly; the role shows THROUGH the content, it is never declared."
    - "No cross-section references — you are blind to siblings, so ban 'as above' / 'the next section' / 'in summary' / 如前一節所述; you will hallucinate a neighbour you cannot see. Invoke a ruling owned elsewhere by the MECHANISM or RESPONSIBILITY it governs ('the safety board's veto'), NEVER a section number or id."
    - "No metaphors / nicknames ('the brain', 'the gatekeeper', 'the front line') and no first-person colloquialism ('we', 'let's') — state responsibilities plainly."
    - "Images: embed only the assets in your aperture, with plain ![caption](assets/<file>); never invent an asset path, never hand-write a figure number ('Figure 3' — the backend numbers figures), never reference a figure in another section. A diagram is a drawio PNG authored by a delegated dspx-diagram subagent — never inline TikZ / {=latex} / mermaid."
    - "Cross-reference by anchor — write <!--@<target-concept-id>--><!--@--> inline where the §number belongs; render injects the live §N between the two invisible comments and re-derives it every render. NEVER hand-type a chapter number (it drifts on any reorder — the real corpus lost 94–107 cross-refs to exactly this). External-standard clause citations (ISO 13849-1 §4.2) stay literal — the anchor is for internal references only."
    - "Punctuation width → docspec normalize (deterministic: half→full only where prose is CJK on both sides; code / identifiers / protocol tokens / URLs stay byte-exact). Write punctuation correctly as you compose, but NEVER run a hand-rolled full-text width sweep or a blind regex; lint V18 flags any residual and points back at normalize."
  zero_inference: >-
    A fact OR rationale absent from material / outline / decisions is written `[TBD]` and you move on —
    never fabricate it. Fabricating a number, a name, or a causal claim is the one unforgivable failure:
    lint blocks a leftover `[TBD]`, but nothing catches a plausible fabrication. Faithfully expanding
    relational / shorthand material (a cumulative `+`, ranges, inheritance in material.md, into explicit
    per-row values) IS rendering, not inference. If a draft would contradict a decision, do NOT write
    around it — emit a `[!WARNING]` naming the decision and stop on that section (lint blocks a leftover
    `[!WARNING]` too, so neither can ship to the reader silently).
  verdict_verbs:
    intro: >-
      Clear a staleness verdict with the MATCHING verb, and give a REAL --reason (every verdict is
      journaled in the article's append-only verdicts log). NEVER fabricate an edit, nor run the
      perturb-render-revert dance (change a character, render, revert, render): its end state is
      byte-identical to an honest ack but leaves zero trace and launders the verdict.
    whitelist:
      - "prose changed → docspec render <article> (plain re-stamp)."
      - "stale-inherited / stale-style / stale-norm, prose reviewed against the moved brief / ruling / doctrine and legitimately unchanged → docspec render <article> --ack <section> (refused if the section is actually stale-own / stale-upstream — that means its own source changed and the prose genuinely needs rewriting)."
      - "stale-own / stale-upstream whose source change is STRUCTURAL WIRING / METADATA ONLY — a realizes / governed-by edge re-wired, an order change, a sources: path move, a decided-in correction, a title renumbering → docspec render <article> --ack-own <section> --reason <text>. This whitelist is EXHAUSTIVE; if the change is not on it, it is not an ack-own case. An ack-own attests the prose still implements CHANGED source, so a factcheck follow-up over the acked sections is expected (non-blocking)."
      - "a content-bearing change (must_cover, breadth, or a decision statement moved) → the prose DOES need rewriting: escalate to rewrite mode via docspec stale <section> --reason (whole article: docspec stale <article> --reason). NEVER ack-own a content change."
    brief_envelope:
      - "brief audience / depth / layout / kind changed → review the existing prose, then ack-or-rewrite: --ack it if it still reads right under the new envelope, rewrite it if the new envelope demands different prose."
      - "brief breadth / must_cover / forbidden changed → rewrite (the coverage contract moved; re-render the leaf from its aperture) — this is never an ack case."
  dispatch_exclusions:
    intro: >-
      When you dispatch a clean-context subagent for judgment work (line edit, a whole-document read),
      open its brief with the line "You do SEMANTIC work only" and then copy this exclusion list
      VERBATIM. The failure is re-deriving which work is mechanical from memory and, in a hurry, letting
      a deterministic sweep slip into a semantic brief (the 台中港 bug: "normalize all punctuation to
      full-width" landed in a semantic subagent's brief). Only items the engine truly enforces say
      "→ the engine"; items it does not validate say "→ you, by hand".
    items:
      - "Punctuation width (full / half-width) → NOT dispatched. Run docspec normalize (lint V18 flags any residual and points back at it). No subagent, no blind regex, no per-sentence hand-fixing, no audit finding."
      - "Leaked scaffolding / placeholder leftovers ({#…} ids, [TBD] / [待補], a stray [!WARNING]) → docspec lint (blocking ERROR). Act on the findings; don't send a subagent hunting them."
      - "Term identity / number drift → docspec lint (advisory WARN). The engine flags, it does not fix — YOU reconcile each by hand against the source; not a subagent's call."
      - "Anchors / reference structure → docspec check. Deterministic resolution, engine-owned."
      - "Banned openers / cross-section references (as above, 如前一節所述) → the engine does NOT validate these; YOU grep for them by hand. Still NOT dispatched — a one-line grep is your own job, and spawning a subagent for it is both waste and a mis-signal that it needs taste."

# Universal filing rules (cross-skill; ONLY rules the engine actually enforces — so they're contract, not stance; guide projects them)
filing-rules:
  - id: bind-by-id
    rule: "Identity = concept.id, location = path. The section↔prose OWNERSHIP binding (which section owns which prose block) lives in the outline/index via stable ids — never a section number, never injected into deliverable prose. (A prose cross-REFERENCE from one section to another is the one sanctioned inline binding — see crossref-by-anchor.)"
    enforced-by: check / lint
  - id: crossref-by-anchor
    rule: "A prose cross-reference to another section/decision (\"see §6.5\", \"per §9.2\") is written as a stable anchor bound to the target's concept.id (or a decision id), NEVER as a hand-typed chapter number. Form: <!--@<id>--><!--@--> inline in the prose (an empty invisible binding + closing sentinel); render injects the current §number between them from the target's outline position, re-derived on every render — reorder/restructure never leaves it dangling. The displayed number is derived-not-stored (excluded from the prose fingerprint, so refreshing it never marks the section stale); check validates the target id is live (a dead anchor = ERROR — cross-document prose references are machine-verifiable for the first time); lint WARNs on any un-anchored literal §N / 第 N 章 left in prose. External-standard clause citations (ISO 13849-1 §4.2) stay literal — the anchor is only for internal cross-references."
    enforced-by: render / check / lint
  - id: supersede-both-sides
    rule: "To supersede decision B with A: set A.supersedes:B AND B.status:superseded + B.superseded-by:A. A half-linked supersede is rejected."
    enforced-by: check
  - id: governed-by-target
    rule: "concept.governed-by must point only at a live concept.id of a real parent document — never a decision/history id, never a parallel sibling."
    enforced-by: check
  - id: crystallize-four-way
    rule: "develop.md content distributes into exactly scope→concept / rulings→decisions / facts→material; rejected/superseded reasoning is recorded as a status:superseded decision that stays in decisions.yaml (never moved to a live-tree history.yaml); genuine throwaway is deleted. concept is required; decisions/material are on-demand (build only when the section owns rulings / has facts — never a fabricated empty container)."
    enforced-by: ready
  - id: retire-via-transaction
    rule: "Retire a decision by marking it status: superseded/deprecated IN PLACE in its decisions.yaml (it stays addressable; view them with docspec show <article> --decisions --all-status, nothing is moved); retire a whole section with docspec retire; rename/move a section folder ONLY via docspec mv — never hand-move/delete; published archive/ is immutable (hash-netted by lint)."
    enforced-by: retire / mv / lint
  - id: sibling-dependency-via-realizes
    rule: "A dependency on ANOTHER section's decision — sibling or cross-document — is declared as a structural edge: concept.realizes (list of decision ids). Never park an internal decision id in sources: (external provenance only) and never rely on a bare id mention in prose — staleness (stale-upstream) and impact only see structural edges."
    enforced-by: check

# Project-level files: not artifacts (no corpus field schema, not in the leaf-section directory), but contracts the agent must know.
# guide projects them, closing the blind spot where the style/term authority is invisible to the agent contract. Injection mechanism is in aperture.py.
project-files:
  - id: writing-guide
    file: writing-guide.md
    meaning: >
      Document-wide writing guide — the only cross-section coherence carrier under blind rendering (tone / structure /
      terminology conventions / global no-go zones). The skeleton is canonical English, language-neutral (writing in English
      still produces a deliverable in any language); the "Project conventions" section is filled in the "deliverable language",
      and the deliverable language is a develop decision, not set at init.
    reader: [apply]            # apply's rewrite mode follows it when blind-writing each section; align mode uses it to check whole-document consistency line by line (already injected by aperture.py)
    writer: [develop]          # only develop writes it (owns the skeleton + fills Project conventions); apply writes only docs,
                               # and merely flags discovered global conventions for develop to extract (same as factcheck "flag, don't fix the source")
    when: >
      init seeds the English skeleton; develop fills Project conventions (including deliverable language, requirement-keyword
      dictionary, banned opening phrases) when converging on the article-level tone — supersede, don't stack; apply/factcheck
      flag new conventions discovered across the whole document for develop. Machine-checkable term identity → glossary.yaml, not here.
    fence: >
      Holds writing doctrine only. Term identity → glossary.yaml; versioning / layout / ops → config.yaml; section-level rules
      longer than one screen → that section's concept.brief. The engine does not validate its content (pure projected doctrine).
  - id: glossary
    file: glossary.yaml
    meaning: >
      Project terminology authority (token consistency). bucket = treatment: module (coined terms/abbreviations → use the
      canonical name, expand the abbreviation, may attach english on first use) / standard (external standard names → official
      spelling verbatim, do not translate) / protocol (protocol tokens → byte-exact, code formatting, do not translate). The
      aperture injects a **lean index** (canonical/bucket/code/aliases_forbidden); definition (a one-line canonical meaning) and
      english are **drill-down fields** — returned on demand via `docspec show <id>` only, not injected (saves tokens), and the
      agent writes per the definition (in its own words, don't clone; fidelity goes to factcheck, non-blocking). Plus lint Vg
      catches violations after the fact.
    reader: [apply, factcheck]         # both get the lean index injected; drill down for definition/english on demand via show <id>
    writer: [develop]                  # develop adds terms while converging; structure validated by check (id unique / canonical required / bucket legal)
    when: >
      develop adds a term when it hits "one thing, many names" or wants to fix a canonical name (each entry requires id + canonical,
      bucket one of three). lint Vg1 (banned word appears) / Vg2 (module code used bare) only WARN; precise judgment goes to audit,
      no hard block. Lifecycle = live state (not a history ledger): on rename → drop the old name into the new term's aliases_forbidden
      (Vg1 catches stragglers); when a concept is truly gone → just delete the entry (a glossary id is not referenced elsewhere, so
      deletion leaves no dead reference; "why it was named" belongs in decisions/history).
    fence: >
      Holds term identity only (canonical / bucket / code / english / definition / aliases_forbidden).
      definition/english = drill-down fields (returned by show <id> only, not injected).
      Writing tone/format → writing-guide.md; project knobs → config.yaml.
  - id: config
    file: config.yaml
    meaning: >
      Forest-level settings + metadata (read by the engine, set by human/init, generally not edited by the agent — unlike
      writing-guide/glossary, not injected via the aperture). Keys: schema (data model), language (interaction/deliverable
      language default), docs_layout (flat | per-article, where deliverables are placed), audit.core/packs (factcheck attack
      surface / regulation packs), autonomy.publish (always human, engine-enforced; the one live knob), purpose (the overall
      goal of the whole forest/project, one or two sentences of authored metadata).
    reader: [engine]           # read at bootstrap; not injected into any skill aperture (listed here only so the agent "knows these knobs exist")
    writer: [init, human]      # created by init (most keys commented out, falling back to defaults), edited by hand
    when: >
      created by init, edited by the human as needed. autonomy.publish is locked to human (the irreversible trigger stays in
      human hands, engine-enforced). docs_layout/language/audit affect behavior, which the agent picks up indirectly via the
      engine/instructions, not by editing this file directly.
    fence: >
      Holds project knobs + forest-level metadata only. purpose = the overall goal of the whole forest (develop projects it into
      the working context, visible via `docspec guide`); with multiple roots and no apex document, it is purpose's only home.
      Writing doctrine → writing-guide.md; term identity → glossary.yaml.
  - id: roadmap
    file: corpus/<article>/roadmap.yaml (per-doc, travels with the tree) | docspec/roadmap.yaml (forest, cross-document); completion
      record (append-only) lives alongside as roadmap-archive.yaml
    meaning: >
      Planned-work backlog — holds only work that is "planned, not yet done, about this forest's documents". **Stateless model: present
      in the file = backlog (to-do); fallen out = done — there is no status/done-to field.** entry = {id, kind(gap|task), title, what,
      target(<section-id> | forest)}; may carry depends-on(a DAG within roadmap → computes unblocked: a dep still present = still
      blocking), waits-on(external prerequisite = prose, not a gate), from-audit(promoted from an audit finding, one-way), priority? /
      note? / promoted-to(a change id — this entry has been promoted into engineering work; content moved with it, only this pointer
      remains, and the entry MUST carry nothing substantial beyond id/title/promoted-to). Completion leaves the file by exactly one of
      two routes: (a) promoted-to a change → the change-archive transaction prunes the entry (the archived dossier IS the completion
      record); (b) small direct work, no change needed → `docspec roadmap done <id> --note "..."` moves it into roadmap-archive.yaml
      (append-only {id, title, note, date}). per-doc (single-document owner) vs forest (cross-document, no single owner) split by
      target. Generated on demand (no file = no backlog).
    reader: [develop]   # at start-of-work develop projects "this document's + the forest's backlog"; queryable any time via the `docspec roadmap` derived view
    writer: [develop]   # develop records planned work (id/kind/title/what/target); completion routes via `roadmap done` or promotion, never a hand-edited status
    when: >
      develop looks at the backlog before starting work; records gap/task (target, optional depends-on). check (structure): rejects
      legacy `status`/`done-to` fields (route completion instead), depends-on dead reference + cycle, target dead reference + filed in
      the right place, from-audit dead reference, promoted-to dead/abandoned-change pointer (★G6: abandoned = orphaned finding, resurrect
      or re-point — never auto-resurrected). lint soft WARN: Vr1 per-doc entries > 7 / Vr2 promoted entry still carrying substantial
      content / Vr3 entry's `what` mirrors an open audit finding in prose (double-ledger — promote, don't copy). **Non-blocking.**
    fence: >
      Holds only "planned, not yet done" backlog. Does not draw the forest map (forest_view derived), does not store completed work
      (revision_history/history/roadmap-archive), does not hold flaws in existing content (audit) — those each have their own home.
  - id: audit
    file: corpus/<article>/audit.yaml (per-doc) | docspec/audit.yaml (forest, cross-document)
    meaning: >
      Red-team audit log of attack and response (factcheck's non-blocking findings). finding = {id, face(5 core + packs), severity,
      status, finding, suggestion, targets(list of sections touched — stable section identifiers only, e.g. a section path or
      §<slug>; NEVER deliverable line numbers, which rot on re-render), sot-owner(cross-document owner of the truth), verdict?(optional
      NLI ruling for citation factchecks: contradicted = a source refutes the claim | unsupported = no source backs it; a claim that is
      entailed/supported raises NO finding — silence is the pass state), promoted-to?(a roadmap id or change id — remediation has been
      promoted into engineering work; the finding collapses to id/face/severity/status/promoted-to, its full body moves with the
      promotion), log(append-only raised→responded trail)}. Stored at "the lowest level that can contain all sections touched": touches
      1 document → that doc-root; ≥ 2 → forest (criterion = number of distinct documents).
    reader: [develop, factcheck]   # factcheck raises/queries, develop/human triages (docspec audit list/show); not injected via the aperture
    writer: [factcheck]            # all via command (audit raise/resolve), append-only, validated on write; the agent does not hand-edit audit.yaml
    when: >
      factcheck `audit raise --target` (the sections touched); routed to doc/forest by number of distinct documents, marking sot-owner
      when cross-document. check validates id unique / face / severity / status + target dead reference + filed in the right place +
      targets never line-number-shaped (ERROR — use a section path or §<slug>) + promoted-to resolves to a live roadmap entry or an
      active/archived change (★G6: pointing at an abandoned change raises an orphan ERROR, never auto-resurrected). lint soft WARN:
      promoted finding still carrying its full body / `L###`-shaped anchors left in the finding prose. **Non-blocking, never blocks
      publish**; a finding that requires engineering work → promoted into a roadmap entry (roadmap from-audit, one-way) or a change.
    fence: >
      Holds only "flaws in existing content" (discovered). Planned work → roadmap, terminology → glossary. Append-only, via command, not hand-edited.
  - id: group
    file: corpus/<article>/<…grouping dir…>/group.yaml (per grouping node, OPTIONAL)
    meaning: >
      A grouping node is an intermediate section directory that has leaf descendants but NO concept.yaml of its own; render emits a
      heading for it so the deliverable hierarchy stays contiguous. By default that heading text is the path segment humanized — which
      renders an English path slug (e.g. `howto` → "How-to") as a heading even in an all-Chinese document. `group.yaml` has two OPTIONAL
      fields: `title` (a string) gives the grouping node an author-controlled, localizable heading text; `order` (a number) gives it an
      author-controlled position among its siblings — without it a concept-less grouping node sorts at a fixed default (0.0) ahead of
      explicitly-ordered siblings. It does NOT make the directory a leaf (leaf discovery keys on concept.yaml): no five-file contract,
      no fingerprint, no completeness fields. OPTIONAL everywhere — absent (or a field absent) ⇒ heading text falls back to
      path-segment humanization and ordering to the default (backward compatible).
    reader: [engine]            # render reads it when emitting the grouping-node heading; not injected into any skill aperture
    writer: [develop]           # develop sets a localized title on grouping nodes (esp. for non-English documents)
    when: >
      develop adds a `group.yaml` (`title: <localized heading>`, optionally `order: <number>`) on a grouping node whenever the path slug
      would otherwise surface as a wrong-language or unpolished heading, or whenever the concept-less grouping node would otherwise sort
      ahead of its explicitly-ordered siblings. Leaf headings/order come from concept.title/order; this is only for the no-concept
      grouping nodes between them.
    fence: >
      Holds only the grouping node's display title (`title`) and optional sibling position (`order`). Leaf identity/brief → that section's
      concept.yaml (a grouping node has none); writing tone → writing-guide.md.
  - id: change
    file: changes/<id>/change.yaml (engine-owned) + changes/<id>/notes.md (cross-section discussion) — project root, sibling of corpus/roadmap/audit
    meaning: >
      A modification event container — the home for work that touches a NORMATIVE ruling or spans sections. STATE = LOCATION +
      DERIVATION, never a status field: changes/<id>/ = active, changes/_archive/<id>/ = accepted, changes/_abandoned/<id>/ = dropped;
      per-target acceptance is DERIVED on demand (never a stored task/checkbox). change.yaml = {id, title, why, created,
      publish(advisory|release-bound, REQUIRED), seeds, targets, fork-hashes} and is ENGINE-OWNED (written only by `docspec change ...`,
      hand-edits are check-flagged). Each target = {ref (concept.id | corpus path for create | file path | glossary term), origin
      (auto|manual), action}. action ∈ create|revise|align|redraft|review|retire|move is BOTH the acceptance criterion AND the apply
      mode (create/redraft → rewrite-from-blank; revise/align → patch-in-place). MODEL: staging is a draft branch — edits land in
      changes/<id>/staging/ (mirroring workspace-relative paths, copy-on-write per section folder / forest file / external file);
      official corpus & docs stay byte-frozen until archive; `docspec render <article> --change <id>` renders the UNION view (staging over
      official) into changes/<id>/preview/ (seeded from the official version so only truly-changed sections surface stale). ARCHIVE is
      the single human gate (running it = acceptance; no separate accept verb, "reject" = keep working until derivation goes green): it
      verifies every target derives done + a fork-drift guard, lands staged files into corpus, routes each affected deliverable (all
      revise/align/review → slot patch; any create/retire/move/redraft → whole-file replace), then freezes the dossier. ABANDON drops
      staging with zero rollback (official never moved). notes.md holds cross-section reasoning and MUST NEVER enter the blind-render
      aperture; it MUST NOT carry checkboxes or a status field (completeness is derived).
    reader: [develop]   # develop opens/works a change; instructions prepends the active-change context on any enlisted section
    writer: [develop]   # only via `docspec change new/add-target/status/archive`; the agent never hand-edits change.yaml
    when: >
      Open a change AT THE MOMENT thinking reveals the work touches a ruling or spans sections (`docspec change new <id> --seed <dec-id>
      --publish advisory|release-bound`) — mid-develop, not an upfront ceremony; the enlistment line is "touches a normative ruling?",
      not section count (a typo/prose-polish proceeds with no change, so every decision's decided-in can reference a change id).
      Promote a roadmap entry with --from-roadmap (move, don't copy: the entry collapses to a promoted-to pointer). check validates the
      container: id unique across states, target ref dead-reference, action/publish/kind enum, promoted-to reverse-completeness.
    fence: >
      Holds the modification event only. Planned-but-not-started work → roadmap; discovered flaws → audit; term identity → glossary;
      writing doctrine → writing-guide. Tasks/progress are DERIVED (docspec change status), never authored — "tasks" names no file.

# The engine recognizes only these reference arrows (closed set)
relation-kinds: [realizes, governs, supersedes]

# ARTIFACTS = store category blocks (store-only-corpus). Each leaf lives as one record inside the
# engine-owned single-file store `corpus/<article>.yaml`, holding three named category blocks:
# concept (mapping) / decisions (list) / material (text). `generates:` is NOT a file the engine
# writes per section on disk — it is the get/put EXPORT-FILENAME convention (`docspec get <section>
# concept` still emits editable `concept.yaml` content for the agent to edit, `docspec put` validates
# and writes it back into the store block). The yaml skeleton is DERIVED from each artifact's field
# schema (yaml_skeleton) — a single source, no hand-maintained templates/{concept,decisions,history}.yaml.
# develop.md is a WORKFILE (workbench in docspec/work/, drained at ready) — outside the store; history
# is a store record category surfaced only in retirement archive packages. Only the .md artifacts
# (material/develop/history-md) keep a real `template:` — they have no yaml fields to derive a skeleton from.
artifacts:
  - id: concept
    generates: concept.yaml   # get/put export-filename convention (store block, not a per-section file)
    kind: yaml
    description: The leaf section's governance and structural contract (one-line concept + writing envelope + source pointers + references).
    # Single source of truth = this schema: the fillable scaffold is DERIVED (yaml_skeleton from the field
    # contract below); there is no hand-maintained templates/concept.yaml to drift against. A fresh section's
    # id/title/order are seeded into develop.md by `docspec new` and read at crystallization.
    instruction: instructions/concept.md
    requires: []
    aperture:
      read:  [develop, apply, factcheck, publish]
      write: [develop]
      projects-into: docs
    closed: true                 # concept top-level keys are fully enumerated; unknown keys fail loud (check)
    schema:
      id:         { type: string,    required: true }
      title:      { type: string,    required: true }   # bare NAME only — never a numbering prefix (6. / 11、 / A.); render derives the outline number from order + tree position and injects it into the heading
      order:      { type: number,    required: true }   # POSITIONAL METADATA (the render-derived outline number, not prose content) — EXCLUDED from the own-source staleness fingerprint: source_hash hashes the parsed concept structure minus `order`, so reordering/swapping siblings never falsely marks a section stale-own. Every OTHER concept field (incl. title) stays in the fingerprint.
      numbering:  { type: enum,      required: false, values: [arabic, appendix, none] }   # outline-numbering policy for the derived heading: arabic (default — 6, 6.1) / appendix (letter series — 附錄 A, A.1) / none (unnumbered, e.g. revision-history). Inherits down the tree.
      status:     { type: enum,      required: true, values: [draft, stable, deprecated] }
      concept:    { type: string,    required: true }
      brief:
        type: object
        required: false          # the whole block may be omitted = inherited; root completeness is enforced by the hierarchy check (a root MUST fill audience/depth/breadth)
        closed: true             # brief sub-keys are fully enumerated; an invented key (e.g. brief.diagram) fails loud
        fields:                  # nested sub-schema → _check_fieldmap recurses over a "non-empty brief"
          # DIFFERENTIAL BRIEF: every sub-field is OPTIONAL. Write a field ONLY when it differs from
          # what the ancestor chain already provides (aperture merges ancestor briefs downward); an
          # absent field means "inherit". Restating an ancestor's value verbatim is copy-paste inflation
          # (lint WARN). A root section is the exception — the hierarchy check requires it to fill the
          # whole envelope (audience/depth/breadth) so children have something to inherit.
          audience: { type: string, required: false }
          depth:    { type: string, required: false }
          breadth:  { type: string, required: false }
          forbidden: { type: list }
          layout:   { type: enum, values: [prose, table, list, diagram] }
          kind:     { type: enum, values: [explain, how-to, reference, tutorial] }   # Diátaxis topic type — optional audit/apply hint, NOT a render gate; inherits down the tree
      must_cover: { type: list,      required: false }
      sources:    { type: list,      required: false }
      realizes:   { type: "list[ref]", required: false, relation: realizes }
      governed-by: { type: "list[ref]", required: false, relation: governs }

  - id: decisions
    generates: decisions.yaml
    kind: yaml
    description: >
      This section's "live" decisions (normative + rationale). ON-DEMAND: the file exists ONLY when the section owns
      normative rulings of its own — absence = zero rulings = a legal state ("this section carries no rulings; it may
      still realize rulings owned elsewhere"). Do NOT fabricate an empty `entries: []` container to "complete the file
      set". A decisions.yaml that EXISTS but is structurally broken still fails loud (absence is legal, presence carries
      responsibility). Dead decisions stay HERE marked status: superseded/deprecated (addressable for the supersede chain
      / deps two-hop) — they are never relocated to a live-tree history.yaml.
    # scaffold DERIVED from the schema below (yaml_skeleton); no hand-maintained templates/decisions.yaml.
    instruction: instructions/decisions.md
    requires: []
    aperture:
      read:  [develop, apply, factcheck, publish]
      write: [develop]
      projects-into: docs
    entries: true                       # this file has a { entries: [...] } structure; schema validates each entry
    closed: true                        # each decisions entry's keys are fully enumerated; unknown keys fail loud (check)
    schema:
      id:            { type: string, required: true }
      kind:          { type: enum,   required: true, values: [normative, rationale] }
      status:        { type: enum,   required: true, values: [proposed, accepted, superseded, deprecated] }
      statement:     { type: string, required: true }
      rationale:     { type: string, required: false }
      rejected:      { type: list,   required: false }
      trace:         { type: object, required: false, relation: governs }
      supersedes:    { type: ref,    required: false, relation: supersedes }
      superseded-by: { type: ref,    required: false, relation: supersedes }
      decided-in:    { type: string, required: false }

  - id: material
    generates: material.md
    kind: md
    description: Note-style chunked writing material (source excerpts / facts / framing / examples / layout hints). ON-DEMAND (optional) — digested objective facts that fuel blind drafting; absent when the section needs none.
    template: templates/material.md
    instruction: instructions/material.md
    requires: []
    aperture:
      read:  [apply, factcheck]
      write: [develop, apply]
      projects-into: null
    block-grammar:
      heading: "## <類型>: <標題> {#m-<錨>}"
      types:   [src, fact, framing, eg, layout]

  - id: develop
    generates: develop.md
    kind: md
    description: Thinking draft / workbench (TRANSIENT — a meeting-minutes-style thinking pad, drained and hard-deleted at `docspec ready`). develop thinks here, then crystallizes into concept/decisions/material.
    template: templates/develop.md
    instruction: instructions/develop.md
    requires: []
    aperture:
      read:  [develop]
      write: [develop]
      projects-into: null
    block-grammar:
      free: true

  - id: history
    generates: history.yaml
    kind: yaml
    description: >
      A "lean index" of retirement records — NOT part of the live-tree leaf contract. It appears ONLY inside a
      `corpus/_archive/<…>/` retirement package produced by the `docspec retire` transaction; a live leaf
      directory never carries a history.yaml. (Dead DECISIONS are NOT relocated here — they stay in their owning
      decisions.yaml marked status: superseded/deprecated.) A retired SECTION's archived package holds one kind:section
      entry (id = that section's concept.id, with an archive link); the summary lives here (a one-line statement), the
      prose detail of "why it was abandoned" lives in the paired history.md (same id), and the detail of a whole-section
      retirement = the archive folder itself. The agent queries via `docspec retired` (summary) / `docspec show <id>`
      (detail), and **never reads the raw files directly**. (store-only-corpus: history is a store record category;
      a legacy scattered live-tree history.yaml is read only by the `docspec store migrate` bridge, never the live path.)
    # scaffold DERIVED from the schema below (yaml_skeleton); no hand-maintained templates/history.yaml.
    instruction: instructions/history.md
    requires: []
    aperture:
      read:  [develop, factcheck]
      write: [develop]
      projects-into: null
    entries: true
    closed: true                        # each history entry's keys are fully enumerated; unknown keys fail loud (check)
    schema:
      id:            { type: string, required: true }
      kind:          { type: enum,   required: true, values: [normative, rationale, section] }
      status:        { type: enum,   required: true, values: [superseded, deprecated, rejected, retired] }
      statement:     { type: string, required: true }
      retired-in:    { type: string, required: false }
      archive:       { type: string, required: false }   # kind=section only: archive folder link (validated as resolvable at retire time)
      supersedes:    { type: ref,    required: false, relation: supersedes }
      superseded-by: { type: ref,    required: false, relation: supersedes }
      decided-in:    { type: string, required: false }

  - id: history-md
    generates: history.md
    kind: md
    description: >
      Prose detail of retirements (**optional**; read by the develop/factcheck agents, never read by apply's rewrite mode, not projected by publish).
      Each section's heading = a clean `## <id>` (bare id, no title, not parsed), recording for that dead decision "why dropped / lost to
      whom / evidence". Corresponds by id to history.yaml (used by show); not hard-bound — given if found, an orphan section at most gets
      a lint reminder. Whole-section retirements are not written here (their detail = the archive folder).
    template: templates/history-md.md
    instruction: instructions/history-md.md
    requires: []
    aperture:
      read:  [develop, factcheck]
      write: [develop]
      projects-into: null
    block-grammar:
      heading: "## <id>"
      free: true
